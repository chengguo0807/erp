server:
  port: 8080

spring:
  application:
    name: erp-gateway
  profiles:
    active: docker

  cloud:
    gateway:
      routes:
        # 系统管理服务
        - id: erp-system
          uri: http://erp-system:8082
          predicates:
            - Path=/system/**, /auth/**, /api/**
          filters:
            - StripPrefix=0

      # 跨域配置
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  data:
    redis:
      host: redis
      port: 6379
      password: 123456
      database: 0

# JWT配置
jwt:
  secret: enterprisehub-erp-secret-key-must-be-at-least-256-bits-long

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.enterprisehub: DEBUG
  file:
    name: /var/log/erp-gateway.log